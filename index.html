<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Expense Tracker Pro</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<nav>

<div class="logo">

💰 Expense Tracker Pro

</div>

<div class="menu">

<button id="themeBtn">

🌙

</button>

</div>

</nav>

<div class="container">

<div class="welcome">

<h1>

Manage Your Money

</h1>

<p>

Track every rupee with style.

</p>

</div>

<div class="cards">

<div class="card balance">

<h3>Total Balance</h3>

<h1 id="balance">

₹0

</h1>

</div>

<div class="card income">

<h3>Income</h3>

<h2 id="income">

₹0

</h2>

</div>

<div class="card expense">

<h3>Expense</h3>

<h2 id="expense">

₹0

</h2>

</div>

</div>

<div class="addBox">

<h2>

Add Transaction

</h2>
<button id="printBtn">🖨️ Print Report</button>
<input
type="text"
id="title"
placeholder="Transaction Name">

<input
type="number"
id="amount"
placeholder="Amount">

<input
type="date"
id="date">

<select id="type">

<option value="Income">

Income

</option>

<option value="Expense">

Expense

</option>

</select>

<button id="addBtn">

Add Transaction

</button>

</div>

<div class="searchBox">

<input
type="text"
id="search"
placeholder="Search transactions...">

</div>

<h2>

Transaction History

</h2>

<div class="table">

<table>

<thead>

<tr>

<th>

Date

</th>

<th>

Name

</th>

<th>

Type

</th>

<th>

Amount

</th>

<th>

Action

</th>

</tr>

</thead>

<tbody id="transactionList">

</tbody>

</table>

</div>

<h2>

Monthly Overview

</h2>

<div class="chartCard">

<canvas id="expenseChart">

</canvas>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
